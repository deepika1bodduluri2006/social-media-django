{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-header bg-primary text-white text-center">

                <h2>🔐 Login</h2>

            </div>

            <div class="card-body p-4">

                {% if form.errors %}

                <div class="alert alert-danger">

                    Invalid username or password.

                </div>

                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            Username

                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Enter username"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold">

                            Password

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter password"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                            Login

                        </button>

                    </div>

                </form>

                <hr>

                <p class="text-center">

                    Don't have an account?

                    <a href="{% url 'register' %}">

                        Register

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
